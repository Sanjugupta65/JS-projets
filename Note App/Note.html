<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note App</title>
    <link rel="stylesheet" href="Note.css">
</head>
<body>
    <div class="container">
        <section id="One">
            <h1> Notepad</h1>
        <input type="text" id="note-title" placeholder="Title...">
        <textarea id="note-body" placeholder="write your Notes"></textarea>
        <button id="save-btn"> save your notes</button>
        </section>
        
        <section id="Two">
            <h2>Saved Notes</h2>
            <div id="note-container"></div>
        </section>

    </div>

    <script src="Note.js"></script>
    
</body>

</html>
